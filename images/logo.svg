<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 60" width="180" height="60">
  <defs>
    <linearGradient id="canopyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a6b1e"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </linearGradient>
  </defs>
  <!-- Tree icon -->
  <g transform="translate(22, 6)">
    <!-- Trunk -->
    <rect x="8" y="30" width="5" height="16" rx="1" fill="#6B4226"/>
    <!-- Canopy layers -->
    <ellipse cx="10.5" cy="24" rx="12" ry="9" fill="url(#canopyGrad)"/>
    <ellipse cx="10.5" cy="19" rx="9" ry="7.5" fill="#3a6b1e"/>
    <ellipse cx="10.5" cy="15" rx="6" ry="6" fill="#407a1f"/>
    <!-- Small accent leaf -->
    <circle cx="18" cy="13" r="2.2" fill="#D4A843" opacity="0.85"/>
    <!-- Roots -->
    <path d="M6 46 Q8 43 9 46" stroke="#6B4226" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M12 46 Q13 43 15 46" stroke="#6B4226" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Gold decorative line -->
  <line x1="46" y1="12" x2="46" y2="48" stroke="#D4A843" stroke-width="1.5" opacity="0.7"/>
  <!-- Text: PAUL'S -->
  <text x="52" y="24" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="bold" fill="#2D5016" letter-spacing="2">PAUL'S</text>
  <!-- Text: TREE SERVICE -->
  <text x="52" y="39" font-family="Georgia, 'Times New Roman', serif" font-size="10.5" fill="#2D5016" letter-spacing="1.8">TREE SERVICE</text>
  <!-- Gold underline accent -->
  <line x1="52" y1="42" x2="130" y2="42" stroke="#D4A843" stroke-width="1" opacity="0.6"/>
  <!-- Est. 1987 -->
  <text x="52" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="7" fill="#6B4226" letter-spacing="1.5" opacity="0.8">EST. 1987</text>
</svg>