<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <!-- Background sky gradient -->
    <linearGradient id="aboutSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4dce8"/>
      <stop offset="50%" stop-color="#d8e8ef"/>
      <stop offset="100%" stop-color="#F5F2EE"/>
    </linearGradient>
    <!-- Warm ground gradient -->
    <linearGradient id="aboutGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7a2a"/>
      <stop offset="40%" stop-color="#3a6518"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </linearGradient>
    <!-- Person shadow -->
    <radialGradient id="personShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#1e3a0e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1e3a0e" stop-opacity="0"/>
    </radialGradient>
    <!-- Warm light overlay -->
    <radialGradient id="warmLight" cx="0.7" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0"/>
    </radialGradient>
    <!-- Tree canopy gradient -->
    <radialGradient id="aboutCanopy" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#3d6b22"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </radialGradient>
  </defs>

  <!-- Sky background -->
  <rect width="600" height="450" fill="url(#aboutSky)"/>

  <!-- Distant treeline -->
  <g fill="#7a9e5a" opacity="0.4">
    <circle cx="50" cy="240" r="30"/>
    <circle cx="90" cy="235" r="35"/>
    <circle cx="130" cy="238" r="28"/>
    <circle cx="170" cy="232" r="32"/>
    <circle cx="210" cy="236" r="26"/>
    <circle cx="500" cy="235" r="32"/>
    <circle cx="540" cy="230" r="36"/>
    <circle cx="575" cy="234" r="30"/>
    <circle cx="600" cy="237" r="28"/>
  </g>

  <!-- Ground -->
  <path d="M0 310 Q150 290 300 300 Q450 285 600 295 L600 450 L0 450 Z" fill="url(#aboutGround)"/>

  <!-- Ground texture -->
  <g stroke="#3a6518" stroke-width="1" opacity="0.3">
    <path d="M50 350 q3 -10 1 -20" fill="none"/>
    <path d="M150 340 q3 -10 1 -20" fill="none"/>
    <path d="M250 345 q3 -10 1 -20" fill="none"/>
    <path d="M450 335 q3 -10 1 -20" fill="none"/>
    <path d="M550 342 q3 -10 1 -20" fill="none"/>
  </g>

  <!-- Large tree on right side -->
  <g transform="translate(420, 0)">
    <!-- Tree shadow on ground -->
    <ellipse cx="30" cy="305" rx="100" ry="18" fill="#1e3a0e" opacity="0.25"/>
    <!-- Trunk -->
    <path d="M18 310 Q15 240 20 150 Q23 140 26 150 Q28 200 27 250 L35 310 Z" fill="#6B4226"/>
    <!-- Bark texture -->
    <path d="M22 280 Q25 275 23 260" stroke="#5a3720" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M24 230 Q27 222 25 210" stroke="#5a3720" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Branches -->
    <path d="M21 200 Q-10 160 -40 130" stroke="#6B4226" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M25 180 Q55 140 80 110" stroke="#6B4226" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M23 230 Q-5 210 -20 190" stroke="#6B4226" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Canopy -->
    <ellipse cx="20" cy="120" rx="110" ry="85" fill="url(#aboutCanopy)"/>
    <ellipse cx="-15" cy="105" rx="70" ry="65" fill="#2a4c14"/>
    <ellipse cx="55" cy="100" rx="75" ry="60" fill="#2a4c14"/>
    <ellipse cx="20" cy="80" rx="75" ry="55" fill="#335e18"/>
    <circle cx="0" cy="75" r="30" fill="#3d6b22" opacity="0.6"/>
    <circle cx="50" cy="70" r="28" fill="#3d6b22" opacity="0.5"/>
    <!-- Roots -->
    <path d="M15 310 Q0 318 -15 312 Q-5 306 15 308" fill="#6B4226"/>
    <path d="M35 310 Q50 316 60 310 Q52 305 35 308" fill="#6B4226"/>
  </g>

  <!-- Person silhouette (Paul) standing left of tree -->
  <g transform="translate(240, 0)">
    <!-- Person shadow on ground -->
    <ellipse cx="25" cy="308" rx="35" ry="8" fill="#1e3a0e" opacity="0.3"/>

    <!-- Boots -->
    <rect x="12" y="296" width="12" height="12" rx="2" fill="#3d2a15"/>
    <rect x="28" y="296" width="12" height="12" rx="2" fill="#3d2a15"/>
    <rect x="9" y="302" width="15" height="6" rx="2" fill="#3d2a15"/>
    <rect x="25" y="302" width="15" height="6" rx="2" fill="#3d2a15"/>

    <!-- Legs -->
    <rect x="14" y="256" width="11" height="42" rx="3" fill="#3d3d3d"/>
    <rect x="28" y="256" width="11" height="42" rx="3" fill="#3d3d3d"/>

    <!-- Torso -->
    <path d="M10 195 Q8 210 10 256 L42 256 Q44 210 42 195 Z" fill="#D4A843" opacity="0.85"/>
    <!-- Shirt detail - collar -->
    <path d="M20 195 L26 205 L32 195" stroke="#c4952e" stroke-width="1.5" fill="none"/>

    <!-- Arms -->
    <!-- Left arm (holding chainsaw) -->
    <path d="M10 200 Q-5 220 -10 245" stroke="#D4A843" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>
    <circle cx="-10" cy="245" r="5" fill="#6B4226"/>
    <!-- Right arm -->
    <path d="M42 200 Q55 225 50 250" stroke="#D4A843" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>
    <circle cx="50" cy="250" r="5" fill="#6B4226"/>

    <!-- Chainsaw in left hand -->
    <g transform="translate(-30, 240)">
      <rect x="10" y="-5" width="22" height="10" rx="2" fill="#cc3333"/>
      <rect x="5" y="-3" width="8" height="6" rx="1" fill="#4a4a4a"/>
      <!-- Chainsaw bar -->
      <rect x="32" y="-2" width="25" height="4" rx="1" fill="#888"/>
      <!-- Chain dots -->
      <circle cx="36" cy="0" r="1" fill="#555"/>
      <circle cx="41" cy="0" r="1" fill="#555"/>
      <circle cx="46" cy="0" r="1" fill="#555"/>
      <circle cx="51" cy="0" r="1" fill="#555"/>
    </g>

    <!-- Neck -->
    <rect x="21" y="186" width="10" height="12" rx="3" fill="#c4956a"/>

    <!-- Head -->
    <ellipse cx="26" cy="176" rx="14" ry="16" fill="#c4956a"/>

    <!-- Hard hat -->
    <path d="M10 170 Q12 155 26 152 Q40 155 42 170 Z" fill="#D4A843"/>
    <rect x="7" y="168" width="38" height="5" rx="2" fill="#c4952e"/>

    <!-- Face details -->
    <circle cx="21" cy="174" r="1.5" fill="#5a3d2a"/>
    <circle cx="31" cy="174" r="1.5" fill="#5a3d2a"/>
    <path d="M22 181 Q26 184 30 181" stroke="#5a3d2a" stroke-width="1.2" fill="none"/>
  </g>

  <!-- Warm light overlay -->
  <rect width="600" height="450" fill="url(#warmLight)"/>

  <!-- Subtle vignette -->
  <rect width="600" height="450" rx="0" fill="none" stroke="#2D5016" stroke-width="80" opacity="0.06"/>

  <!-- Bottom warm strip -->
  <rect y="420" width="600" height="30" fill="#6B4226" opacity="0.08"/>
</svg>