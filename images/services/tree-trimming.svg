<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6BAFE0"/>
      <stop offset="70%" stop-color="#A8D4F0"/>
      <stop offset="100%" stop-color="#F5F2EE"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A7A2E"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5A3A1A"/>
      <stop offset="50%" stop-color="#6B4226"/>
      <stop offset="100%" stop-color="#4A2E16"/>
    </linearGradient>
    <linearGradient id="canopyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A8A2A"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </linearGradient>
    <linearGradient id="bucketTruck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E0D4"/>
      <stop offset="100%" stop-color="#C8BEB0"/>
    </linearGradient>
    <linearGradient id="armGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8923A"/>
    </linearGradient>
    <clipPath id="canopyClip">
      <ellipse cx="250" cy="130" rx="130" ry="100"/>
    </clipPath>
  </defs>

  <!-- Sky -->
  <rect width="600" height="400" fill="url(#sky)"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.6">
    <ellipse cx="100" cy="50" rx="50" ry="20"/>
    <ellipse cx="130" cy="45" rx="35" ry="18"/>
    <ellipse cx="70" cy="48" rx="30" ry="15"/>
    <ellipse cx="450" cy="70" rx="45" ry="18"/>
    <ellipse cx="480" cy="65" rx="30" ry="15"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="320" width="600" height="80" fill="url(#ground)"/>
  <ellipse cx="300" cy="325" rx="320" ry="20" fill="#4A7A2E"/>

  <!-- Main tree trunk -->
  <rect x="225" y="120" width="50" height="210" fill="url(#trunk)" rx="4"/>
  <!-- Bark texture -->
  <line x1="233" y1="140" x2="233" y2="320" stroke="#4A2E16" stroke-width="1.5" opacity="0.4"/>
  <line x1="250" y1="130" x2="250" y2="325" stroke="#4A2E16" stroke-width="1" opacity="0.3"/>
  <line x1="265" y1="135" x2="265" y2="320" stroke="#4A2E16" stroke-width="1.5" opacity="0.4"/>

  <!-- Major branches -->
  <g stroke="#6B4226" fill="none" stroke-linecap="round">
    <path d="M250,180 Q200,160 160,130" stroke-width="12"/>
    <path d="M250,160 Q300,130 340,100" stroke-width="10"/>
    <path d="M250,200 Q310,180 360,170" stroke-width="8"/>
    <path d="M250,150 Q230,120 200,90" stroke-width="8"/>
    <path d="M250,170 Q270,140 290,110" stroke-width="6"/>
  </g>

  <!-- Tree canopy (well-shaped, trimmed side and untrimmed side) -->
  <!-- Trimmed canopy (left and top - neat shape) -->
  <ellipse cx="250" cy="120" rx="120" ry="90" fill="url(#canopyGrad)"/>
  <ellipse cx="220" cy="100" rx="80" ry="60" fill="#3D6B1E"/>
  <ellipse cx="280" cy="110" rx="70" ry="55" fill="#2D5016"/>
  <ellipse cx="250" cy="80" rx="75" ry="45" fill="#3D6B1E"/>
  <!-- Highlights -->
  <ellipse cx="230" cy="90" rx="35" ry="22" fill="#4A8A2A" opacity="0.4"/>
  <ellipse cx="270" cy="100" rx="30" ry="20" fill="#4A8A2A" opacity="0.3"/>

  <!-- Untrimmed branch sticking out (right side, being cut) -->
  <g>
    <path d="M340,100 Q380,85 410,95" stroke="#6B4226" stroke-width="6" fill="none" stroke-linecap="round"/>
    <ellipse cx="400" cy="80" rx="35" ry="25" fill="#3D6B1E"/>
    <ellipse cx="410" cy="90" rx="25" ry="18" fill="#2D5016"/>
  </g>

  <!-- Cut marks where branch was trimmed -->
  <circle cx="340" cy="100" r="5" fill="#D4A843"/>

  <!-- Bucket truck -->
  <g transform="translate(420, 180)">
    <!-- Boom arm segments -->
    <rect x="-10" y="80" width="15" height="100" rx="3" fill="url(#armGrad)" transform="rotate(-15, -2, 130)"/>
    <rect x="-5" y="10" width="12" height="90" rx="3" fill="url(#armGrad)" transform="rotate(20, 1, 55)"/>
    <!-- Hydraulic details -->
    <line x1="0" y1="85" x2="5" y2="15" stroke="#B8923A" stroke-width="2"/>

    <!-- Bucket -->
    <rect x="-25" y="-25" width="40" height="35" rx="4" fill="#555"/>
    <rect x="-23" y="-22" width="36" height="28" rx="3" fill="#666"/>
    <!-- Bucket rail -->
    <rect x="-27" y="-28" width="44" height="4" rx="2" fill="#777"/>

    <!-- Worker in bucket silhouette -->
    <g fill="#1A1A1A">
      <!-- Hard hat -->
      <rect x="-8" y="-45" width="18" height="5" rx="2" fill="#D4A843"/>
      <ellipse cx="1" cy="-38" rx="10" ry="4" fill="#D4A843"/>
      <!-- Head -->
      <circle cx="1" cy="-33" r="8"/>
      <!-- Upper body visible above bucket -->
      <rect x="-8" y="-25" width="18" height="20" rx="3"/>
      <!-- Arms extended with pole saw -->
      <rect x="-40" y="-30" width="35" height="6" rx="2" transform="rotate(-20, -22, -27)"/>
    </g>

    <!-- Pole saw -->
    <rect x="-65" y="-40" width="30" height="4" rx="1" fill="#888"/>
    <rect x="-70" y="-42" width="8" height="8" rx="1" fill="#666"/>
    <!-- Saw blade -->
    <path d="M-70,-38 L-78,-42 L-70,-46" fill="#AAA"/>
  </g>

  <!-- Truck body -->
  <g transform="translate(420, 340)">
    <rect x="-30" y="-20" width="120" height="35" rx="4" fill="#E8E0D4"/>
    <rect x="-50" y="-35" width="50" height="50" rx="4" fill="#D8D0C4"/>
    <!-- Windshield -->
    <rect x="-45" y="-30" width="30" height="20" rx="2" fill="#6BAFE0" opacity="0.5"/>
    <!-- Wheels -->
    <circle cx="-20" cy="18" r="12" fill="#333"/>
    <circle cx="-20" cy="18" r="6" fill="#555"/>
    <circle cx="65" cy="18" r="12" fill="#333"/>
    <circle cx="65" cy="18" r="6" fill="#555"/>
    <!-- Company color stripe -->
    <rect x="-28" y="-8" width="116" height="6" rx="2" fill="#2D5016"/>
  </g>

  <!-- Falling cut branches -->
  <g>
    <!-- Branch 1 falling -->
    <g transform="translate(370, 140) rotate(25)">
      <line x1="0" y1="0" x2="30" y2="5" stroke="#6B4226" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="25" cy="0" rx="15" ry="10" fill="#3D6B1E" opacity="0.8"/>
    </g>
    <!-- Branch 2 falling -->
    <g transform="translate(390, 200) rotate(40)">
      <line x1="0" y1="0" x2="20" y2="3" stroke="#6B4226" stroke-width="3" stroke-linecap="round"/>
      <ellipse cx="18" cy="-2" rx="12" ry="8" fill="#2D5016" opacity="0.7"/>
    </g>
    <!-- Small twigs falling -->
    <g stroke="#6B4226" stroke-width="2" stroke-linecap="round" opacity="0.6">
      <line x1="380" y1="170" x2="390" y2="180"/>
      <line x1="400" y1="230" x2="405" y2="245"/>
    </g>
    <!-- Leaves falling -->
    <g fill="#3D6B1E" opacity="0.5">
      <ellipse cx="385" cy="250" rx="4" ry="2" transform="rotate(30, 385, 250)"/>
      <ellipse cx="395" cy="270" rx="3" ry="1.5" transform="rotate(-20, 395, 270)"/>
      <ellipse cx="375" cy="285" rx="4" ry="2" transform="rotate(50, 375, 285)"/>
      <ellipse cx="405" cy="295" rx="3" ry="1.5" transform="rotate(-40, 405, 295)"/>
    </g>
  </g>

  <!-- Cut branches on ground -->
  <g>
    <line x1="350" y1="330" x2="420" y2="325" stroke="#6B4226" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="410" cy="320" rx="20" ry="12" fill="#3D6B1E" opacity="0.7"/>
    <line x1="360" y1="340" x2="400" y2="335" stroke="#6B4226" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="395" cy="332" rx="12" ry="8" fill="#2D5016" opacity="0.6"/>
  </g>

  <!-- Grass tufts -->
  <g stroke="#4A8A2A" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5">
    <path d="M100,335 Q102,325 105,335"/>
    <path d="M103,335 Q106,322 108,335"/>
    <path d="M180,340 Q182,330 185,340"/>
    <path d="M550,338 Q553,328 555,338"/>
  </g>
</svg>