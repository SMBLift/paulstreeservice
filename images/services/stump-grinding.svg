<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#B8DFF0"/>
      <stop offset="100%" stop-color="#E8E4DE"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A7A2E"/>
      <stop offset="40%" stop-color="#3D6B1E"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </linearGradient>
    <linearGradient id="stumpSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5A3A1A"/>
      <stop offset="50%" stop-color="#6B4226"/>
      <stop offset="100%" stop-color="#4A2E16"/>
    </linearGradient>
    <linearGradient id="stumpTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B89040"/>
    </linearGradient>
    <linearGradient id="machineBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8923A"/>
    </linearGradient>
    <radialGradient id="grindWheel" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="70%" stop-color="#666"/>
      <stop offset="100%" stop-color="#444"/>
    </radialGradient>
    <linearGradient id="dirtPile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C49838"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="600" height="400" fill="url(#sky)"/>

  <!-- Background trees -->
  <g opacity="0.25">
    <polygon points="30,280 55,100 80,280" fill="#2D5016"/>
    <polygon points="60,280 90,120 120,280" fill="#3D6B1E"/>
    <polygon points="500,280 525,130 550,280" fill="#2D5016"/>
    <polygon points="540,280 560,150 580,280" fill="#3D6B1E"/>
    <rect x="50" y="180" width="10" height="100" fill="#5A3A1A" opacity="0.5"/>
    <rect x="85" y="160" width="10" height="120" fill="#5A3A1A" opacity="0.5"/>
    <rect x="520" y="190" width="10" height="90" fill="#5A3A1A" opacity="0.5"/>
    <rect x="555" y="200" width="10" height="80" fill="#5A3A1A" opacity="0.5"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="280" width="600" height="120" fill="url(#ground)"/>
  <ellipse cx="300" cy="285" rx="320" ry="18" fill="#4A7A2E"/>

  <!-- Dirt area around stump -->
  <ellipse cx="220" cy="310" rx="100" ry="30" fill="#8B7355"/>
  <ellipse cx="220" cy="310" rx="80" ry="22" fill="#9B8365"/>

  <!-- Tree stump (partially ground down) -->
  <!-- Full stump on right side -->
  <path d="M190,260 L190,310 Q220,325 250,310 L250,260 Z" fill="url(#stumpSide)"/>
  <ellipse cx="220" cy="260" rx="32" ry="12" fill="url(#stumpTop)"/>
  <!-- Tree rings on top -->
  <ellipse cx="220" cy="260" rx="24" ry="9" fill="none" stroke="#B89040" stroke-width="1" opacity="0.6"/>
  <ellipse cx="220" cy="260" rx="16" ry="6" fill="none" stroke="#B89040" stroke-width="1" opacity="0.6"/>
  <ellipse cx="220" cy="260" rx="8" ry="3" fill="none" stroke="#B89040" stroke-width="1" opacity="0.6"/>
  <ellipse cx="220" cy="260" rx="3" ry="1" fill="#B89040" opacity="0.5"/>

  <!-- Ground down portion (left side of stump, lower) -->
  <path d="M188,280 L188,310 Q200,320 215,312" fill="#9B8365"/>
  <!-- Rough ground-down texture -->
  <g fill="#D4A843" opacity="0.4">
    <rect x="188" y="278" width="20" height="3" rx="1"/>
    <rect x="190" y="283" width="18" height="2" rx="1"/>
    <rect x="189" y="288" width="22" height="2" rx="1"/>
  </g>

  <!-- Root stubs visible -->
  <g fill="#6B4226">
    <path d="M190,305 Q170,308 155,315 Q155,320 170,318 Q190,312 192,308 Z"/>
    <path d="M250,305 Q270,310 280,318 Q278,322 265,318 Q248,312 248,308 Z"/>
    <path d="M210,315 Q205,325 195,335 Q198,338 210,328 Q215,318 213,315 Z"/>
  </g>

  <!-- Stump grinder machine -->
  <g transform="translate(340, 240)">
    <!-- Machine base/chassis -->
    <rect x="-20" y="30" width="100" height="40" rx="5" fill="url(#machineBody)"/>
    <rect x="-15" y="25" width="90" height="10" rx="3" fill="#C49838"/>

    <!-- Engine housing -->
    <rect x="30" y="0" width="50" height="30" rx="4" fill="#555"/>
    <rect x="35" y="5" width="40" height="20" rx="2" fill="#444"/>
    <!-- Engine vents -->
    <g stroke="#555" stroke-width="1.5">
      <line x1="40" y1="10" x2="40" y2="20"/>
      <line x1="45" y1="10" x2="45" y2="20"/>
      <line x1="50" y1="10" x2="50" y2="20"/>
      <line x1="55" y1="10" x2="55" y2="20"/>
      <line x1="60" y1="10" x2="60" y2="20"/>
    </g>

    <!-- Boom arm -->
    <rect x="-60" y="15" width="80" height="14" rx="3" fill="#888"/>
    <rect x="-58" y="18" width="76" height="8" rx="2" fill="#777"/>
    <!-- Hydraulic cylinder -->
    <rect x="-10" y="8" width="30" height="6" rx="2" fill="#AAA"/>
    <rect x="-5" y="9" width="20" height="4" rx="1" fill="#999"/>

    <!-- Grinding wheel -->
    <circle cx="-65" cy="22" r="22" fill="url(#grindWheel)"/>
    <circle cx="-65" cy="22" r="18" fill="#555"/>
    <!-- Cutting teeth -->
    <g fill="#D4A843">
      <rect x="-88" y="20" width="5" height="4" rx="1"/>
      <rect x="-46" y="20" width="5" height="4" rx="1"/>
      <rect x="-67" y="-1" width="4" height="5" rx="1"/>
      <rect x="-67" y="39" width="4" height="5" rx="1"/>
      <rect x="-82" y="6" width="4" height="4" rx="1" transform="rotate(-45, -80, 8)"/>
      <rect x="-50" y="6" width="4" height="4" rx="1" transform="rotate(45, -48, 8)"/>
      <rect x="-82" y="34" width="4" height="4" rx="1" transform="rotate(45, -80, 36)"/>
      <rect x="-50" y="34" width="4" height="4" rx="1" transform="rotate(-45, -48, 36)"/>
    </g>
    <!-- Motion blur lines around wheel -->
    <g stroke="#AAA" stroke-width="1" opacity="0.3" fill="none">
      <circle cx="-65" cy="22" r="26"/>
      <circle cx="-65" cy="22" r="28" stroke-dasharray="4,4"/>
    </g>

    <!-- Wheels -->
    <circle cx="0" cy="75" r="14" fill="#333"/>
    <circle cx="0" cy="75" r="7" fill="#555"/>
    <circle cx="60" cy="75" r="14" fill="#333"/>
    <circle cx="60" cy="75" r="7" fill="#555"/>

    <!-- Handle bars -->
    <rect x="70" y="-5" width="8" height="40" rx="3" fill="#555"/>
    <rect x="65" y="-10" width="18" height="8" rx="3" fill="#333"/>
    <!-- Grip -->
    <rect x="66" y="-12" width="16" height="4" rx="2" fill="#2D5016"/>
  </g>

  <!-- Wood chips flying from grinding -->
  <g>
    <!-- Arc of chips spraying up and to the left -->
    <g fill="#D4A843">
      <rect x="240" y="230" width="6" height="3" rx="1" transform="rotate(-30, 243, 231)"/>
      <rect x="230" y="220" width="5" height="2" rx="1" transform="rotate(-45, 232, 221)"/>
      <rect x="250" y="225" width="4" height="3" rx="1" transform="rotate(-20, 252, 226)"/>
      <rect x="220" y="215" width="5" height="2" rx="1" transform="rotate(-60, 222, 216)"/>
      <rect x="260" y="235" width="6" height="2" rx="1" transform="rotate(-15, 263, 236)"/>
      <rect x="235" y="240" width="4" height="2" rx="1" transform="rotate(10, 237, 241)"/>
      <rect x="215" y="235" width="5" height="3" rx="1" transform="rotate(-50, 217, 236)"/>
      <rect x="245" y="215" width="3" height="2" rx="1" transform="rotate(-35, 246, 216)"/>
    </g>
    <!-- Lighter colored chips -->
    <g fill="#E8C860" opacity="0.7">
      <rect x="225" y="225" width="4" height="2" rx="1" transform="rotate(-40, 227, 226)"/>
      <rect x="255" y="220" width="3" height="2" rx="1" transform="rotate(-25, 256, 221)"/>
      <rect x="210" y="225" width="5" height="2" rx="1" transform="rotate(-55, 212, 226)"/>
      <rect x="240" y="210" width="4" height="2" rx="1" transform="rotate(-30, 242, 211)"/>
    </g>
  </g>

  <!-- Wood chip pile on ground -->
  <ellipse cx="200" cy="320" rx="50" ry="12" fill="url(#dirtPile)"/>
  <ellipse cx="195" cy="318" rx="40" ry="8" fill="#D4A843" opacity="0.6"/>
  <g fill="#D4A843" opacity="0.4">
    <circle cx="180" cy="320" r="2"/>
    <circle cx="210" cy="322" r="1.5"/>
    <circle cx="195" cy="316" r="1.5"/>
    <circle cx="225" cy="319" r="2"/>
    <circle cx="170" cy="318" r="1"/>
    <circle cx="165" cy="325" r="1.5"/>
    <circle cx="240" cy="323" r="1"/>
  </g>

  <!-- Scattered sawdust -->
  <g fill="#C49838" opacity="0.3">
    <circle cx="150" cy="310" r="3"/>
    <circle cx="280" cy="315" r="2"/>
    <circle cx="160" cy="300" r="2"/>
    <circle cx="270" cy="305" r="2.5"/>
  </g>

  <!-- Grass details -->
  <g stroke="#4A8A2A" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4">
    <path d="M100,300 Q102,290 104,300"/>
    <path d="M450,295 Q452,285 454,295"/>
    <path d="M480,300 Q483,288 485,300"/>
    <path d="M120,305 Q122,295 125,305"/>
  </g>
</svg>