<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6BAFE0"/>
      <stop offset="60%" stop-color="#A8D4F0"/>
      <stop offset="100%" stop-color="#F5F2EE"/>
    </linearGradient>
    <linearGradient id="grassLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A7A2E"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </linearGradient>
    <linearGradient id="clearedGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4A878"/>
      <stop offset="100%" stop-color="#A08858"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5A3A1A"/>
      <stop offset="50%" stop-color="#6B4226"/>
      <stop offset="100%" stop-color="#4A2E16"/>
    </linearGradient>
    <linearGradient id="canopy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A8A2A"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </linearGradient>
    <linearGradient id="equipBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8923A"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="600" height="400" fill="url(#sky)"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.5">
    <ellipse cx="120" cy="45" rx="55" ry="20"/>
    <ellipse cx="155" cy="40" rx="35" ry="16"/>
    <ellipse cx="400" cy="55" rx="50" ry="18"/>
    <ellipse cx="435" cy="50" rx="30" ry="14"/>
  </g>

  <!-- Wooded area (left side - before) -->
  <!-- Dense tree line on left -->
  <g>
    <!-- Background trees (far) -->
    <g opacity="0.4">
      <ellipse cx="20" cy="170" rx="40" ry="50" fill="#1A4A0A"/>
      <ellipse cx="60" cy="160" rx="45" ry="55" fill="#2D5016"/>
      <ellipse cx="100" cy="165" rx="40" ry="50" fill="#1A4A0A"/>
    </g>

    <!-- Mid trees -->
    <rect x="15" y="180" width="12" height="120" fill="url(#trunk)"/>
    <ellipse cx="21" cy="170" rx="35" ry="45" fill="url(#canopy)"/>
    <ellipse cx="21" cy="155" rx="25" ry="30" fill="#3D6B1E"/>

    <rect x="55" y="170" width="14" height="130" fill="url(#trunk)"/>
    <ellipse cx="62" cy="155" rx="40" ry="50" fill="url(#canopy)"/>
    <ellipse cx="62" cy="140" rx="30" ry="35" fill="#3D6B1E"/>

    <rect x="100" y="180" width="13" height="120" fill="url(#trunk)"/>
    <ellipse cx="107" cy="165" rx="35" ry="45" fill="url(#canopy)"/>
    <ellipse cx="107" cy="150" rx="28" ry="32" fill="#3D6B1E"/>

    <!-- Foreground tree (edge of clearing) -->
    <rect x="150" y="160" width="16" height="150" fill="url(#trunk)"/>
    <ellipse cx="158" cy="140" rx="45" ry="55" fill="url(#canopy)"/>
    <ellipse cx="158" cy="120" rx="35" ry="40" fill="#3D6B1E"/>
    <ellipse cx="145" cy="135" rx="20" ry="25" fill="#4A8A2A" opacity="0.4"/>

    <!-- Undergrowth -->
    <g fill="#2D5016" opacity="0.6">
      <ellipse cx="40" cy="290" rx="30" ry="12"/>
      <ellipse cx="80" cy="285" rx="25" ry="10"/>
      <ellipse cx="120" cy="288" rx="28" ry="11"/>
    </g>
  </g>

  <!-- Transition zone (diagonal clearing line) -->
  <!-- Left side: grass/wooded ground -->
  <polygon points="0,290 200,280 200,400 0,400" fill="url(#grassLeft)"/>

  <!-- Right side: cleared ground -->
  <polygon points="200,280 600,270 600,400 200,400" fill="url(#clearedGround)"/>
  <!-- Dirt texture on cleared area -->
  <g fill="#B09848" opacity="0.3">
    <ellipse cx="300" cy="310" rx="40" ry="8"/>
    <ellipse cx="400" cy="330" rx="35" ry="6"/>
    <ellipse cx="480" cy="315" rx="30" ry="7"/>
    <ellipse cx="350" cy="350" rx="25" ry="5"/>
    <ellipse cx="520" cy="340" rx="30" ry="6"/>
  </g>

  <!-- Stumps in cleared area -->
  <g>
    <!-- Stump 1 -->
    <rect x="240" y="290" width="25" height="15" rx="2" fill="#6B4226"/>
    <ellipse cx="252" cy="290" rx="14" ry="5" fill="#D4A843"/>
    <ellipse cx="252" cy="290" rx="9" ry="3" fill="none" stroke="#B89040" stroke-width="0.5" opacity="0.6"/>

    <!-- Stump 2 -->
    <rect x="330" y="300" width="20" height="12" rx="2" fill="#6B4226"/>
    <ellipse cx="340" cy="300" rx="11" ry="4" fill="#D4A843"/>

    <!-- Stump 3 -->
    <rect x="420" y="295" width="22" height="13" rx="2" fill="#6B4226"/>
    <ellipse cx="431" cy="295" rx="12" ry="4.5" fill="#D4A843"/>

    <!-- Stump 4 (small) -->
    <rect x="280" y="320" width="16" height="10" rx="2" fill="#6B4226"/>
    <ellipse cx="288" cy="320" rx="9" ry="3.5" fill="#D4A843"/>

    <!-- Stump 5 (small) -->
    <rect x="500" y="310" width="18" height="11" rx="2" fill="#6B4226"/>
    <ellipse cx="509" cy="310" rx="10" ry="4" fill="#D4A843"/>
  </g>

  <!-- Few remaining trees at right edge -->
  <g opacity="0.5">
    <rect x="555" y="180" width="10" height="90" fill="url(#trunk)"/>
    <ellipse cx="560" cy="175" rx="25" ry="30" fill="url(#canopy)"/>
    <ellipse cx="560" cy="162" rx="18" ry="20" fill="#3D6B1E"/>

    <rect x="580" y="190" width="10" height="80" fill="url(#trunk)"/>
    <ellipse cx="585" cy="185" rx="22" ry="25" fill="url(#canopy)"/>
  </g>

  <!-- Bulldozer/equipment silhouette in the cleared area -->
  <g transform="translate(380, 240)">
    <!-- Tracks -->
    <rect x="-45" y="30" width="90" height="20" rx="8" fill="#333"/>
    <rect x="-42" y="33" width="84" height="14" rx="6" fill="#444"/>
    <!-- Track segments -->
    <g stroke="#555" stroke-width="1.5">
      <line x1="-35" y1="33" x2="-35" y2="47"/>
      <line x1="-25" y1="33" x2="-25" y2="47"/>
      <line x1="-15" y1="33" x2="-15" y2="47"/>
      <line x1="-5" y1="33" x2="-5" y2="47"/>
      <line x1="5" y1="33" x2="5" y2="47"/>
      <line x1="15" y1="33" x2="15" y2="47"/>
      <line x1="25" y1="33" x2="25" y2="47"/>
      <line x1="35" y1="33" x2="35" y2="47"/>
    </g>
    <!-- Sprockets -->
    <circle cx="-35" cy="40" r="8" fill="#555"/>
    <circle cx="-35" cy="40" r="4" fill="#444"/>
    <circle cx="35" cy="40" r="8" fill="#555"/>
    <circle cx="35" cy="40" r="4" fill="#444"/>

    <!-- Body -->
    <rect x="-30" y="5" width="70" height="28" rx="4" fill="url(#equipBody)"/>
    <!-- Cab -->
    <rect x="10" y="-20" width="30" height="28" rx="3" fill="#B8923A"/>
    <rect x="14" y="-16" width="22" height="16" rx="2" fill="#6BAFE0" opacity="0.4"/>
    <!-- Exhaust stack -->
    <rect x="35" y="-15" width="5" height="20" rx="2" fill="#555"/>
    <!-- Exhaust smoke -->
    <g fill="#666" opacity="0.3">
      <circle cx="38" cy="-20" r="4"/>
      <circle cx="40" cy="-28" r="3"/>
      <circle cx="42" cy="-35" r="2"/>
    </g>

    <!-- Blade (front) -->
    <rect x="-55" y="10" width="12" height="35" rx="2" fill="#888"/>
    <rect x="-58" y="8" width="6" height="39" rx="2" fill="#777"/>
    <!-- Blade push arms -->
    <rect x="-43" y="18" width="15" height="5" rx="1" fill="#999"/>
    <rect x="-43" y="28" width="15" height="5" rx="1" fill="#999"/>

    <!-- Dirt being pushed by blade -->
    <ellipse cx="-62" cy="42" rx="15" ry="8" fill="#A08858"/>
    <ellipse cx="-60" cy="38" rx="10" ry="5" fill="#B09848"/>
  </g>

  <!-- Tire tracks/marks in cleared area -->
  <g stroke="#9A8248" stroke-width="3" opacity="0.3" fill="none">
    <path d="M250,345 Q320,340 380,335 Q440,330 520,340"/>
    <path d="M250,350 Q320,345 380,340 Q440,335 520,345"/>
  </g>

  <!-- Small debris/branches scattered -->
  <g stroke="#6B4226" stroke-width="2" stroke-linecap="round" opacity="0.4">
    <line x1="260" y1="310" x2="275" y2="308"/>
    <line x1="370" y1="320" x2="385" y2="318"/>
    <line x1="450" y1="330" x2="460" y2="327"/>
    <line x1="310" y1="340" x2="322" y2="337"/>
  </g>

  <!-- Wood chip piles -->
  <g fill="#D4A843" opacity="0.4">
    <ellipse cx="260" cy="305" rx="12" ry="4"/>
    <ellipse cx="350" cy="315" rx="10" ry="3"/>
    <ellipse cx="470" cy="320" rx="8" ry="3"/>
  </g>

  <!-- Division line indicator (subtle) -->
  <line x1="195" y1="160" x2="195" y2="290" stroke="#D4A843" stroke-width="2" stroke-dasharray="6,4" opacity="0.3"/>
</svg>