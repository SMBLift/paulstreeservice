<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6CAED8"/>
      <stop offset="100%" stop-color="#B8DCF0"/>
    </linearGradient>
    <linearGradient id="grass6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A8A3E"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </linearGradient>
    <radialGradient id="mulchGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="60%" stop-color="#B8923A"/>
      <stop offset="100%" stop-color="#8B6B2F"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="300" fill="url(#sky6)"/>
  <!-- Clouds -->
  <ellipse cx="100" cy="40" rx="50" ry="18" fill="white" opacity="0.6"/>
  <ellipse cx="300" cy="55" rx="40" ry="15" fill="white" opacity="0.5"/>
  <!-- House -->
  <rect x="250" y="90" width="130" height="110" fill="#F5F2EE"/>
  <polygon points="250,90 315,45 380,90" fill="#6B4226"/>
  <rect x="280" y="115" width="25" height="30" fill="#87CEEB" opacity="0.5"/>
  <rect x="320" y="115" width="25" height="30" fill="#87CEEB" opacity="0.5"/>
  <rect x="295" y="155" width="25" height="45" fill="#6B4226"/>
  <!-- Porch step -->
  <rect x="285" y="195" width="45" height="5" fill="#8B7355"/>
  <!-- Background tree -->
  <rect x="55" y="60" width="12" height="140" fill="#6B4226" opacity="0.6"/>
  <ellipse cx="61" cy="50" rx="40" ry="45" fill="#2D5016" opacity="0.5"/>
  <!-- Ground -->
  <rect x="0" y="200" width="400" height="100" fill="url(#grass6)"/>
  <!-- Clean hole where stump was -->
  <ellipse cx="170" cy="215" rx="50" ry="18" fill="#8B6B2F"/>
  <ellipse cx="170" cy="215" rx="45" ry="15" fill="#7A5C28"/>
  <ellipse cx="170" cy="218" rx="40" ry="12" fill="#6B4D20"/>
  <!-- Depth shading in hole -->
  <ellipse cx="170" cy="220" rx="35" ry="10" fill="#5A4018" opacity="0.8"/>
  <!-- Fresh mulch ring around hole -->
  <g fill="url(#mulchGrad)" opacity="0.8">
    <ellipse cx="170" cy="210" rx="60" ry="22" fill="none" stroke="#D4A843" stroke-width="8" opacity="0.4"/>
  </g>
  <!-- Mulch pieces scattered -->
  <g fill="#D4A843" opacity="0.6">
    <rect x="120" y="208" width="5" height="3" rx="1" transform="rotate(15,122,209)"/>
    <rect x="135" y="200" width="4" height="3" rx="1" transform="rotate(-20,137,201)"/>
    <rect x="200" y="205" width="5" height="3" rx="1" transform="rotate(40,202,206)"/>
    <rect x="215" y="212" width="4" height="2" rx="1" transform="rotate(-10,217,213)"/>
    <rect x="145" y="230" width="5" height="3" rx="1" transform="rotate(25,147,231)"/>
    <rect x="190" y="228" width="4" height="3" rx="1" transform="rotate(-35,192,229)"/>
    <rect x="160" y="235" width="5" height="2" rx="1" transform="rotate(50,162,236)"/>
    <rect x="110" y="220" width="4" height="3" rx="1" transform="rotate(5,112,221)"/>
    <rect x="225" y="218" width="5" height="2" rx="1" transform="rotate(-15,227,219)"/>
    <rect x="130" y="215" width="6" height="3" rx="1" transform="rotate(30,133,216)"/>
  </g>
  <!-- Fresh grass area around -->
  <ellipse cx="170" cy="215" rx="70" ry="28" fill="#5A8A3E" opacity="0.2"/>
  <!-- Checkmark / finished job indicator -->
  <g transform="translate(330, 230)">
    <circle cx="0" cy="0" r="20" fill="#2D5016" opacity="0.8"/>
    <path d="M-10,0 L-3,8 L12,-8" fill="none" stroke="#F5F2EE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Driveway -->
  <path d="M0,250 Q100,235 250,200" fill="none" stroke="#C8C0B5" stroke-width="30" opacity="0.3"/>
  <!-- Flower bed near house -->
  <g>
    <circle cx="255" cy="195" r="4" fill="#D44A4A" opacity="0.6"/>
    <circle cx="265" cy="192" r="3" fill="#E06080" opacity="0.6"/>
    <circle cx="248" cy="190" r="3.5" fill="#D44A4A" opacity="0.5"/>
    <ellipse cx="256" cy="198" rx="12" ry="4" fill="#2D5016" opacity="0.4"/>
  </g>
</svg>