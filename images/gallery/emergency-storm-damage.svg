<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="stormSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A3A4A"/>
      <stop offset="40%" stop-color="#4A5A6A"/>
      <stop offset="100%" stop-color="#6A7A8A"/>
    </linearGradient>
    <linearGradient id="grass11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A6020"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </linearGradient>
    <linearGradient id="lightning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
  </defs>
  <!-- Dark stormy sky -->
  <rect width="400" height="300" fill="url(#stormSky)"/>
  <!-- Storm clouds -->
  <ellipse cx="100" cy="40" rx="80" ry="35" fill="#3A4A5A" opacity="0.9"/>
  <ellipse cx="200" cy="30" rx="90" ry="40" fill="#2A3A4A" opacity="0.9"/>
  <ellipse cx="300" cy="45" rx="75" ry="30" fill="#3A4A5A" opacity="0.9"/>
  <ellipse cx="150" cy="55" rx="60" ry="25" fill="#4A5A6A" opacity="0.8"/>
  <ellipse cx="250" cy="50" rx="70" ry="28" fill="#3A4A5A" opacity="0.8"/>
  <!-- Lightning bolt -->
  <path d="M180,15 L170,55 L185,50 L165,95 L180,88 L155,140" fill="none" stroke="url(#lightning)" stroke-width="3" opacity="0.8"/>
  <path d="M180,15 L170,55 L185,50 L165,95 L180,88 L155,140" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
  <!-- Rain -->
  <g stroke="#8AACCC" stroke-width="1" opacity="0.4">
    <line x1="50" y1="70" x2="45" y2="90"/>
    <line x1="100" y1="60" x2="95" y2="80"/>
    <line x1="150" y1="75" x2="145" y2="95"/>
    <line x1="250" y1="65" x2="245" y2="85"/>
    <line x1="300" y1="70" x2="295" y2="90"/>
    <line x1="350" y1="60" x2="345" y2="80"/>
    <line x1="75" y1="100" x2="70" y2="120"/>
    <line x1="125" y1="95" x2="120" y2="115"/>
    <line x1="225" y1="90" x2="220" y2="110"/>
    <line x1="275" y1="100" x2="270" y2="120"/>
    <line x1="375" y1="85" x2="370" y2="105"/>
    <line x1="25" y1="110" x2="20" y2="130"/>
    <line x1="175" y1="105" x2="170" y2="125"/>
    <line x1="325" y1="95" x2="320" y2="115"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="210" width="400" height="90" fill="url(#grass11)"/>
  <!-- Road -->
  <rect x="0" y="230" width="400" height="40" fill="#555"/>
  <line x1="0" y1="250" x2="400" y2="250" stroke="#D4A843" stroke-width="2" stroke-dasharray="15,10"/>
  <!-- Fence (partially broken) -->
  <g fill="#8B7355">
    <rect x="10" y="200" width="4" height="30"/>
    <rect x="50" y="200" width="4" height="30"/>
    <rect x="90" y="200" width="4" height="30"/>
    <!-- Broken fence section -->
    <rect x="130" y="205" width="4" height="25" transform="rotate(25,132,217)"/>
    <rect x="170" y="210" width="4" height="20" transform="rotate(-15,172,220)"/>
  </g>
  <rect x="10" y="205" width="80" height="3" fill="#8B7355"/>
  <!-- Fallen tree across road and fence -->
  <g>
    <!-- Main trunk fallen diagonally -->
    <rect x="80" y="150" width="250" height="25" fill="#6B4226" rx="5" transform="rotate(15, 200, 162)"/>
    <!-- Trunk base (where it snapped) -->
    <rect x="300" y="130" width="30" height="55" fill="#6B4226"/>
    <!-- Jagged break point -->
    <polygon points="300,130 295,140 305,145 298,155 310,155 300,165" fill="#D4A843" opacity="0.7"/>
    <!-- Standing stump portion -->
    <rect x="305" y="160" width="25" height="50" fill="#6B4226"/>
    <!-- Root ball visible -->
    <ellipse cx="317" cy="210" rx="20" ry="8" fill="#5A3620"/>
    <!-- Fallen canopy on road -->
    <ellipse cx="100" cy="180" rx="55" ry="40" fill="#2D5016" opacity="0.85"/>
    <ellipse cx="70" cy="190" rx="35" ry="25" fill="#1A3009" opacity="0.8"/>
    <ellipse cx="130" cy="185" rx="35" ry="25" fill="#2D5016" opacity="0.8"/>
    <ellipse cx="100" cy="170" rx="40" ry="25" fill="#3D6B1E" opacity="0.7"/>
    <!-- Scattered branches -->
    <line x1="60" y1="220" x2="100" y2="235" stroke="#6B4226" stroke-width="3" stroke-linecap="round"/>
    <line x1="140" y1="225" x2="170" y2="240" stroke="#6B4226" stroke-width="2" stroke-linecap="round"/>
    <line x1="80" y1="240" x2="120" y2="250" stroke="#6B4226" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Leaves scattered -->
  <g fill="#2D5016" opacity="0.5">
    <circle cx="50" cy="245" r="3"/>
    <circle cx="150" cy="255" r="2.5"/>
    <circle cx="200" cy="240" r="3"/>
    <circle cx="180" cy="260" r="2"/>
  </g>
  <!-- Urgent red glow / warning feel -->
  <rect x="0" y="0" width="400" height="300" fill="#FF0000" opacity="0.03"/>
  <!-- Emergency text banner -->
  <g transform="translate(320, 25)">
    <rect x="-50" y="-12" width="100" height="22" rx="3" fill="#CC3333" opacity="0.85"/>
    <text x="0" y="3" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">EMERGENCY</text>
  </g>
</svg>