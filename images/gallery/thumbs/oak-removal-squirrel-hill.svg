<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#C8E6F0"/>
    </linearGradient>
    <linearGradient id="grass1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A7A2E"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </linearGradient>
    <radialGradient id="canopy1" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#3D6B1E"/>
      <stop offset="70%" stop-color="#2D5016"/>
      <stop offset="100%" stop-color="#1A3009"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="300" fill="url(#sky1)"/>
  <!-- Clouds -->
  <ellipse cx="80" cy="50" rx="50" ry="20" fill="white" opacity="0.7"/>
  <ellipse cx="60" cy="45" rx="35" ry="18" fill="white" opacity="0.6"/>
  <ellipse cx="320" cy="70" rx="40" ry="15" fill="white" opacity="0.5"/>
  <!-- House -->
  <rect x="240" y="130" width="120" height="90" fill="#D4A843" opacity="0.9"/>
  <polygon points="240,130 300,80 360,130" fill="#6B4226"/>
  <rect x="270" y="155" width="25" height="30" fill="#F5F2EE"/>
  <rect x="310" y="155" width="25" height="30" fill="#F5F2EE"/>
  <rect x="288" y="185" width="24" height="35" fill="#6B4226"/>
  <!-- Ground -->
  <rect x="0" y="220" width="400" height="80" fill="url(#grass1)"/>
  <!-- Oak tree trunk (partially cut) -->
  <rect x="120" y="100" width="30" height="120" fill="#6B4226"/>
  <rect x="110" y="180" width="50" height="40" fill="#6B4226" rx="3"/>
  <!-- Cut line -->
  <line x1="110" y1="160" x2="150" y2="160" stroke="#D4A843" stroke-width="3"/>
  <!-- Oak canopy (upper portion tilting) -->
  <g transform="rotate(-15, 135, 100)">
    <ellipse cx="135" cy="60" rx="70" ry="55" fill="url(#canopy1)"/>
    <ellipse cx="100" cy="70" rx="40" ry="35" fill="#2D5016"/>
    <ellipse cx="170" cy="70" rx="35" ry="30" fill="#2D5016"/>
    <ellipse cx="135" cy="40" rx="45" ry="30" fill="#3D6B1E"/>
  </g>
  <!-- Fallen branches on ground -->
  <line x1="50" y1="240" x2="100" y2="235" stroke="#6B4226" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="237" x2="85" y2="228" stroke="#6B4226" stroke-width="2" stroke-linecap="round"/>
  <line x1="160" y1="245" x2="200" y2="240" stroke="#6B4226" stroke-width="3" stroke-linecap="round"/>
  <!-- Worker silhouette -->
  <g transform="translate(175, 175)">
    <circle cx="0" cy="-5" r="7" fill="#1A3009"/>
    <rect x="-6" y="2" width="12" height="22" fill="#1A3009" rx="2"/>
    <rect x="-8" y="24" width="7" height="18" fill="#1A3009" rx="2"/>
    <rect x="1" y="24" width="7" height="18" fill="#1A3009" rx="2"/>
    <!-- Chainsaw -->
    <rect x="8" y="8" width="20" height="5" fill="#D4A843" rx="1"/>
    <rect x="28" y="7" width="12" height="7" fill="#8B8B8B" rx="1"/>
  </g>
  <!-- Wood chips on ground -->
  <circle cx="130" cy="250" r="2" fill="#D4A843" opacity="0.7"/>
  <circle cx="145" cy="255" r="1.5" fill="#D4A843" opacity="0.6"/>
  <circle cx="118" cy="248" r="2.5" fill="#D4A843" opacity="0.5"/>
  <circle cx="155" cy="252" r="1.8" fill="#D4A843" opacity="0.6"/>
  <!-- Sawdust -->
  <ellipse cx="135" cy="220" rx="25" ry="5" fill="#D4A843" opacity="0.3"/>
</svg>